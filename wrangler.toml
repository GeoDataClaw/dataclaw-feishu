name = "dataclaw-feishu"
main = "worker/index.js"
account_id = "c80f28112df2895a03261efef13f4fe8"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build:worker"
cwd = "."
watch_dir = ["src", "worker"]

[env.production]
name = "dataclaw-feishu-prod"

[env.staging]
name = "dataclaw-feishu-staging"

# Environment variables (set these using wrangler secret put)
# SNAPPDOWN_API_BASE_URL = "https://www.geodataclaw.com/api"

# KV namespace for caching (optional)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"
# preview_id = "your-preview-kv-namespace-id"

# Custom domains (configure after deployment)
# [env.production]
# routes = [
#   { pattern = "dataclaw.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]
